<header class="top-nav" aria-label="Platform toolbar">
  <button class="new-button" type="button">
    <!-- <svg viewBox="0 0 24 24" aria-hidden="true">
      <use href="/icons/plus.svg#plus"></use>
    </svg> -->
    <span>New</span>
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <use href="/icons/chevron-down.svg#chevron-down"></use>
    </svg>
  </button>

  <label class="search-box">
    <span class="sr-only">Search papers, topics, collaborators</span>
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <use href="/icons/search.svg#search"></use>
    </svg>
    <input type="search" placeholder="Search papers, topics, collaborators..." />
    <kbd>⌘ K</kbd>
  </label>

  <div class="top-actions">
    <button class="icon-button" type="button" aria-label="Notifications">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <use href="/icons/bell.svg#bell"></use>
      </svg>
      <span>{{ topNavConfig.notifications }}</span>
    </button>

    <button class="icon-button" type="button" aria-label="Messages">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <use href="/icons/mail.svg#mail"></use>
      </svg>
      <span>{{ topNavConfig.mails }}</span>
    </button>

    <span class="profile-copy">
      <strong>{{ topNavConfig.client.title }} {{ topNavConfig.client.firstName }} {{ topNavConfig.client.lastName
        }}</strong>
      <small>{{ topNavConfig.client.jobTitle }}</small>
    </span>
    <span class="avatar" aria-hidden="true">{{ topNavConfig.client.firstName.charAt(0) }}{{
      topNavConfig.client.lastName.charAt(0) }}</span>


  </div>
</header>
