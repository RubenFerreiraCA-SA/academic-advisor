<section class="papers-page" aria-label="Papers">
  <header class="page-header">
    <div class="page-title">
      <h1>Papers</h1>
      <span class="paper-count">{{ papers.length }}</span>
    </div>
    <div class="view-toggle" role="group" aria-label="View mode">
      <button type="button"
              class="toggle-btn"
              [class.active]="viewMode() === 'table'"
              (click)="setView('table')"
              aria-label="Table view">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/list-view.svg#list-view"></use>
        </svg>
      </button>
      <button type="button"
              class="toggle-btn"
              [class.active]="viewMode() === 'card'"
              (click)="setView('card')"
              aria-label="Card view">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/grid-view.svg#grid-view"></use>
        </svg>
      </button>
    </div>
  </header>

  @if (viewMode() === 'table') {
    <app-custom-dynamic-table [config]="tableConfig" (rowClick)="onRowClick($event)" />
  } @else {
    <div class="card-view" >
      <nav class="category-chips" aria-label="Filter by category">
        @for (chip of categoryChips(); track chip.id) {
          <button type="button"
                  class="chip"
                  [class.active]="activeCategory() === chip.id"
                  (click)="setCategory(chip.id)"
                  [attr.aria-pressed]="activeCategory() === chip.id">
            {{ chip.label }}
            <span class="chip-count">{{ chip.count }}</span>
          </button>
        }
      </nav>

      <div class="card-grid">
        @for (paper of filteredPapers(); track paper.title) {
          <app-info-card [paper]="paper" (cardClicked)="onCardClicked($event)" />
        }
      </div>
    </div>
  }
</section>
