<div class="platform-shell">
  <aside class="side-nav" aria-label="Platform navigation">
    <div class="brand">
      <svg viewBox="0 0 44 44" aria-hidden="true">

          <path d="M9.5 8.5h5" />
          <path d="M9.5 12h5" />

      </span>
      <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
        <path d="m8 10 4 4 4-4" />
      </svg>
    </button>

    <nav class="nav-list">
      <a routerLink="/platform/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">

          <path d="M4.5 11.2 12 4.8l7.5 6.4" />

          <path d="M10 18.5v-5h4v5" />

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 3.5h7l3 3v14H7z" />
          <path d="M14 3.5v3h3" />
          <path d="M9.5 12h5" />
          <path d="M9.5 15.5h4" />
        </svg>
        <span>Papers</span>
      </a>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 4h10v16H7z" />
          <path d="M9.5 8h5" />
          <path d="M9.5 12h5" />
          <path d="M9.5 16h3" />
        </svg>
        <span>Tasks</span>
        <em>12</em>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">

          <path d="M9.5 12h5" />

        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 20V9l6-5 6 5v11" />

        <span>Submissions</span>
      </a>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 18V9" />

    <section class="storage-card" aria-label="Storage usage">

      <p>64.7 GB of 200 GB used</p>
      <div class="meter" aria-hidden="true"><span></span></div>
      <button type="button">Manage Storage</button>

    <section class="support-card" aria-label="Help and support">
      <h2>Help &amp; Support</h2>
      <a href="#">Documentation</a>
      <a href="#">Video Tutorials</a>
      <a href="#">Contact Support</a>
      <button type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6 9 12l6 6" />
        </svg>
        <span>Collapse</span>
      </button>
    </section>

  <main class="platform-content">
    <router-outlet />
  </main>
