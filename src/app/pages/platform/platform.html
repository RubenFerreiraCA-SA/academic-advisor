<div class="platform-shell">
  <aside class="side-nav" aria-label="Platform navigation">
    <div class="brand">
      <svg viewBox="0 0 44 44" aria-hidden="true">
        <use href="/icons/acapublish-mark.svg#acapublish-mark"></use>
      </svg>
      <span>AcaPublish</span>
    </div>

    <button class="workspace-switch" type="button" aria-label="Switch workspace">
      <span class="workspace-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/workspace.svg#workspace"></use>
        </svg>
      </span>
      <span>
        <strong>Research Workspace</strong>
        <small>Pro Plan</small>
      </span>
      <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
        <use href="/icons/chevron-down.svg#chevron-down"></use>
      </svg>
    </button>

    <nav class="nav-list">
      <a routerLink="/platform/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/home.svg#home"></use>
        </svg>
        <span>Dashboard</span>
      </a>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/document-text.svg#document-text"></use>
        </svg>
        <span>Papers</span>
      </a>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/document-simple.svg#document-simple"></use>
        </svg>
        <span>Tasks</span>
        <em>12</em>
      </a>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/document-search.svg#document-search"></use>
        </svg>
        <span>Review Queue</span>
        <em>7</em>
      </a>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/collaborators.svg#collaborators"></use>
        </svg>
        <span>Collaborators</span>
      </a>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/calendar.svg#calendar"></use>
        </svg>
        <span>Calendar</span>
      </a>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/document-simple.svg#document-simple"></use>
        </svg>
        <span>Templates</span>
      </a>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/submissions.svg#submissions"></use>
        </svg>
        <span>Submissions</span>
      </a>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/analytics.svg#analytics"></use>
        </svg>
        <span>Analytics</span>
        <b>New</b>
      </a>

      <a class="nav-item" href="#" aria-disabled="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/settings.svg#settings"></use>
        </svg>
        <span>Settings</span>
      </a>
    </nav>

    <div class="nav-spacer"></div>

    <section class="storage-card" aria-label="Storage usage">
      <h2>Storage</h2>
      <p>64.7 GB of 200 GB used</p>
      <div class="meter" aria-hidden="true"><span></span></div>
      <button type="button">Manage Storage</button>
    </section>

    <section class="support-card" aria-label="Help and support">
      <h2>Help &amp; Support</h2>
      <a href="#">Documentation</a>
      <a href="#">Video Tutorials</a>
      <a href="#">Contact Support</a>
      <button type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/chevron-left.svg#chevron-left"></use>
        </svg>
        <span>Collapse</span>
      </button>
    </section>
  </aside>

  <section class="platform-main">
    <header class="top-nav" aria-label="Platform toolbar">
      <label class="search-box">
        <span class="sr-only">Search papers, topics, collaborators</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <use href="/icons/search.svg#search"></use>
        </svg>
        <input type="search" placeholder="Search papers, topics, collaborators..." />
        <kbd>⌘ K</kbd>
      </label>

      <div class="top-actions">
        <button class="icon-button" type="button" aria-label="Notifications">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <use href="/icons/bell.svg#bell"></use>
          </svg>
          <span>3</span>
        </button>

        <button class="icon-button" type="button" aria-label="Messages">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <use href="/icons/mail.svg#mail"></use>
          </svg>
          <span>5</span>
        </button>

        <button class="profile-button" type="button" aria-label="Open profile menu">
          <span class="avatar" aria-hidden="true">AM</span>
          <span class="profile-copy">
            <strong>Dr. Alex Morgan</strong>
            <small>Researcher</small>
          </span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <use href="/icons/chevron-down.svg#chevron-down"></use>
          </svg>
        </button>

        <button class="new-paper-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <use href="/icons/plus.svg#plus"></use>
          </svg>
          <span>New Paper</span>
          <span class="button-divider" aria-hidden="true"></span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <use href="/icons/chevron-down.svg#chevron-down"></use>
          </svg>
        </button>
      </div>
    </header>

    <main class="platform-content">
      <router-outlet />
    </main>
  </section>
</div>
