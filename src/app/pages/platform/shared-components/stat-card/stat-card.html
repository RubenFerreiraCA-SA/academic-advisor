<span class="icon">
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <use [attr.href]="'/icons/' + stat().icon + '.svg#' + stat().icon"></use>
  </svg>
</span>
<span class="label">{{ stat().label }}</span>
<strong>{{ stat().value }}</strong>
<small>
  @if (stat().trendIcon) {
    <b>{{ stat().trendIcon }}</b>
  }
  {{ stat().detail }}
</small>
